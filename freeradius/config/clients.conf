# =============================================================
# clients.conf  –  NAS Clients (fallback local)
# Localização: /etc/freeradius/3.0/clients.conf
#
# Estes clientes são definidos em arquivo.
# Os clientes do banco (tabela "nas") são carregados pelo
# módulo SQL quando habilitado.
# =============================================================

# -----------------------------------------------------------
# Cliente padrão: localhost
# Usado pelo radtest executado dentro do próprio container
# -----------------------------------------------------------
client localhost {
  ipaddr          = 127.0.0.1
  secret          = testing123        # shared secret
  require_message_authenticator = no
  nas_type        = other
  shortname       = localhost
}

# -----------------------------------------------------------
# Rede interna Docker (172.20.0.0/24)
# Permite que qualquer container na rede acesse o RADIUS
# -----------------------------------------------------------
client docker-internal {
  ipaddr          = 172.20.0.0
  netmask         = 24               # /24 = aceita 172.20.0.1 até 172.20.0.254
  secret          = testing123
  require_message_authenticator = no
  nas_type        = other
  shortname       = docker-net
}

# -----------------------------------------------------------
# Host físico (máquina que roda o Docker)
# O host acessa via localhost mapeado, mas por segurança
# também aceitamos o IP do gateway do Docker
# -----------------------------------------------------------
client docker-host {
  ipaddr          = 172.20.0.1       # IP do gateway na rede radius-net
  secret          = testing123
  require_message_authenticator = no
  nas_type        = other
  shortname       = docker-host
}
