# =============================================================
# radiusd.conf  –  Arquivo principal do FreeRADIUS
# Localização no container: /etc/freeradius/3.0/radiusd.conf
# =============================================================

# Prefixo de instalação (não altere)
prefix       = /usr
exec_prefix  = /usr
sysconfdir   = /etc
localstatedir = /var
sbindir      = ${exec_prefix}/sbin
logdir       = /var/log/freeradius
raddbdir     = /etc/freeradius/3.0
radacctdir   = ${logdir}/radacct

# Usuário e grupo que o processo vai rodar
# A imagem Docker usa "freerad"
user         = freerad
group        = freerad

# Arquivo de PID
pidfile      = ${run_dir}/radiusd.pid

# Diretório de módulos
modconfdir   = ${confdir}/mods-config

# Nome desta instância (útil com múltiplos servidores)
name         = radiusd

# =============================================================
# Configurações de log
# =============================================================
log {
  destination = stdout      # logs vão para stdout (visível no docker logs)
  colourise   = yes         # cores para facilitar leitura em debug
  file        = ${logdir}/radius.log
  syslog_facility = daemon

  # Loga usuário e senha nas tentativas (APENAS em dev/POC!)
  auth        = yes
  auth_badpass = yes
  auth_goodpass = yes
}

# =============================================================
# Segurança
# =============================================================
security {
  user  = freerad
  group = freerad

  # Permite rodar em modo debug sem ser root
  allow_core_dumps = no

  # Máximo de atributos por pacote
  max_attributes = 200

  # Rejeita requisições com User-Password vazio
  reject_delay = 1
}

# =============================================================
# Threads
# =============================================================
thread pool {
  start_servers      = 5
  max_servers        = 32
  min_spare_servers  = 3
  max_spare_servers  = 10
  max_requests_per_server = 0
  auto_limit_acct    = no
}

# =============================================================
# Inclui os demais arquivos de configuração
# =============================================================
$INCLUDE clients.conf          # NAS clients (fallback arquivo local)
$INCLUDE mods-enabled/         # módulos ativos (links simbólicos)
$INCLUDE policy.d/             # políticas customizadas
$INCLUDE sites-enabled/        # virtual servers ativos
